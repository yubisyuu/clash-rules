    filter: "美|US|States|(?i)America"

  - name: All Nodes
    type: url-test
    use: [sushi_cloud]
    icon: "https://fastly.jsdelivr.net/gh/blackmatrix7/ios_rule_script/icon/color/global.png"
    exclude-filter: "续费|到期|剩余|官网|提示|通知|公告|网站|地址"

