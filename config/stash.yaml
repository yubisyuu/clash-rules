# =====================================================================
# Stash 分流规则 (Loyalsoldier + blackmatrix7 + bgpeer)
# 适配环境：Stash (iOS / macOS / tvOS / visionOS)
# 规则模型：洋葱过滤 → 广告拒止 → 券商/加密精准注入 → 服务分流 → 国内直连 → GFW 代理 → MATCH 兜底
# =====================================================================

# =====================================================================
# [全局基础] — Stash 须拆分端口
# =====================================================================
port: 7890
socks-port: 7891
allow-lan: true
bind-address: "*"
mode: rule
log-level: warning
ipv6: false

profile:
  store-selected: true

# =====================================================================
# DNS — Stash 简化版 (不支持 fake-ip-range / cache-algorithm / listen)
# =====================================================================
dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver-policy:
    "geosite:cn,private":
      - 223.5.5.5
      - 119.29.29.29

# =====================================================================
# [Proxy Providers]
# =====================================================================
proxy-providers:
  sushi_cloud:
    type: http
    url: "YOUR_SUBSCRIPTION_URL"
    path: ./sushi_provider.yaml
    interval: 36000
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 300

# =====================================================================
# [Proxy Groups] — 洋葱过滤核心
# =====================================================================
proxy-groups:

  # --- 默认出口 ---
  - name: Default
    type: select
    icon: "https://fastly.jsdelivr.net/gh/blackmatrix7/ios_rule_script/icon/color/shadowrocket.png"
    proxies: [DIRECT, Hong Kong, Taiwan, Japan, Korea, Singapore, US, All Nodes]

  - name: AI
