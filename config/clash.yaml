# =====================================================================
# [规则匹配逻辑 - 九层洋葱过滤模型]
# =====================================================================
rules:
  # 第一层：局域网与进程绕过
  - RULE-SET,ls_lan,DIRECT,no-resolve

  # 第二层：广告屏蔽
  - RULE-SET,bm_ad,REJECT
  - DOMAIN-SUFFIX,ut.taobao.com,REJECT
  - DOMAIN-SUFFIX,bugly.qq.com,REJECT

  # 第三层：AI 服务（ChatGPT → Claude → Gemini）
  - RULE-SET,ys_chatgpt,ChatGPT
  - RULE-SET,ys_claude,Claude
  - RULE-SET,ys_gemini,Gemini

  # 第四层：社媒（Telegram → X → TikTok → Instagram → YouTube → Google）
  - RULE-SET,ys_telegram,Telegram
  - RULE-SET,ys_x,X
  - RULE-SET,ys_tiktok,TikTok
  - RULE-SET,ys_instagram,Instagram
  - RULE-SET,ys_youtube,YouTube
  - RULE-SET,ys_google,Google

  # 第五层：银行与券商
  - RULE-SET,ys_hsbc,HSBC Hong Kong
  - DOMAIN-SUFFIX,hsbcbroker.com,HSBC Hong Kong
  - DOMAIN-SUFFIX,securities.hsbc.com.hk,HSBC Hong Kong
  - RULE-SET,ys_ibkr,Interactive Brokers
  - RULE-SET,ys_futu,Futu
  - RULE-SET,ys_longbridge,Longbridge
  - RULE-SET,ys_usmart,uSmart
  - RULE-SET,ys_zinvest,Zinvest
  - RULE-SET,ys_phillip,Phillip
  - RULE-SET,ys_zircon,Zircon

  # 第六层：加密货币
  - RULE-SET,ys_coinbase,Coinbase
  - RULE-SET,ys_kraken,Kraken
  - RULE-SET,ys_osl,OSL
  - RULE-SET,ys_crypto,Crypto

  # 第七层：开发者与游戏平台
  - RULE-SET,ys_github,GitHub
  - RULE-SET,ys_steam,Steam
  - RULE-SET,ys_xbox,XBOX
  - RULE-SET,ys_microsoft,Microsoft

  # 第八层：流媒体
  - RULE-SET,ys_netflix,NETFLIX

  # 其他（无独立策略组）
  - RULE-SET,ys_docker,Default
  - RULE-SET,ys_nintendo,DIRECT

  # 巴哈姆特（台湾站）
  - DOMAIN-SUFFIX,gamer.com.tw,Taiwan

  # Apple 服务 → 国内直连
  - RULE-SET,ls_apple,DIRECT

  # 国内域名 → 直连
  - RULE-SET,ls_direct,DIRECT

  # GFW / 代理列表 → 兜底策略
  - RULE-SET,ls_gfw,Default
  - RULE-SET,ls_proxy,Default

  # 中国 IP → 直连（no-resolve）
  - RULE-SET,ls_cncidr,DIRECT,no-resolve

  # 终局
  - MATCH,Default
