# =====================================================================
# Rule Providers (统一 fastly CDN 镜像)
# =====================================================================
rule-providers:
  ls_dom: &ls_dom { type: http, behavior: domain, format: text, interval: 86400 }
  ls_ip: &ls_ip { type: http, behavior: ipcidr, format: text, interval: 86400 }
  bm_cls: &bm_cls { type: http, behavior: classical, format: yaml, interval: 86400 }

  # 广告
  bm_ad:
    { <<: *bm_cls, url: "https://fastly.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Advertising/Advertising.yaml" }

  # 券商（bgpeer）
  bm_hsbc:
    { <<: *bm_cls, url: "https://cdn.jsdelivr.net/gh/yubisyuu/clash-rules@main/rules/hsbc.yaml" }
  bm_ibkr:
