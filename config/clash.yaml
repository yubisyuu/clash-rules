# =====================================================================
# Clash 分流 (Loyalsoldier + blackmatrix7 + bgpeer)
# 适配环境：Clash Verge / Clash Meta / OpenClash
# 规则模型：洋葱过滤 → 广告拒止 → 券商/加密精准注入 → 服务分流 → 国内直连 → GFW 代理 → MATCH 兜底
# =====================================================================

# =====================================================================
# [全局基础]
# =====================================================================
mixed-port: 7890
allow-lan: true
bind-address: "*"
mode: rule
log-level: warning
ipv6: false
unified-delay: true
tcp-concurrent: true

profile:
  store-selected: true

# =====================================================================
# Sniffer — 域名嗅探
# =====================================================================
sniffer:
  enable: true
  force-domain-sniffing: true 
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"
    - "+.apple.com"

# =====================================================================
# TUN — 入站隧道
# =====================================================================
tun:
  enable: true
  stack: system
  dns-hijack:
    - "any:53"
    - "tcp://any:53"
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true

# =====================================================================
# DNS — Fake-IP
# =====================================================================
dns:
  enable: true
  ipv6: false
  listen: 0.0.0.0:1053
  cache-algorithm: arc
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  respect-rules: true
  
  proxy-server-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  nameserver-policy:
    "geosite:cn,private":
      - 223.5.5.5
      - 119.29.29.29

# =====================================================================
# [Proxy Providers]
# =====================================================================
proxy-providers:
  sushi_cloud:
    type: http
    url: "YOUR_SUBSCRIPTION_URL"
    path: ./sushi_provider.yaml
    interval: 36000
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 300

# =====================================================================
