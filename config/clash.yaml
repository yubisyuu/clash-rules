# =====================================================================
# [规则匹配逻辑 - 九层洋葱过滤模型]
# =====================================================================
rules:
  # 第一层：局域网与进程绕过
  - RULE-SET,ls_lan,DIRECT,no-resolve

  # 第二层：广告屏蔽
  - RULE-SET,bm_ad,REJECT
  - DOMAIN-SUFFIX,ut.taobao.com,REJECT
  - DOMAIN-SUFFIX,bugly.qq.com,REJECT

  # 第三层：银行与券商 — bgpeer RULE-SET + 关键域内联兜底
  - RULE-SET,bm_hsbc,HSBC Hong Kong
  - DOMAIN-SUFFIX,hsbcbroker.com,HSBC Hong Kong
  - DOMAIN-SUFFIX,securities.hsbc.com.hk,HSBC Hong Kong
  - RULE-SET,bm_ibkr,Interactive Brokers
  - RULE-SET,bm_longbridge,Longbridge

  # 第四层：加密货币交易所（须在泛 Crypto 之前，防止覆盖）
  - RULE-SET,bm_kraken,Kraken
  - DOMAIN-SUFFIX,coinbase.com,Coinbase
  - DOMAIN-SUFFIX,coinbase-commerce.com,Coinbase
  - DOMAIN-SUFFIX,cbpayments.com,Coinbase
  - DOMAIN-SUFFIX,osl.com,OSL
  - DOMAIN-SUFFIX,oslgroup.com,OSL

  # 第五层：券商（手动内联域）
  - DOMAIN-SUFFIX,usmart.com,uSmart
  - DOMAIN-SUFFIX,usmart.hk,uSmart
  - DOMAIN-SUFFIX,investassistant.com,Zinvest
  - DOMAIN-SUFFIX,zvstapp.com,Zinvest
  - DOMAIN-SUFFIX,financialdatamining.com,Zinvest
  - DOMAIN-SUFFIX,aliyuncs.com,Zinvest
  - DOMAIN-SUFFIX,tpns.tencent.com,Zinvest
  - DOMAIN-SUFFIX,phillip.com.hk,Phillip
  - DOMAIN-SUFFIX,phillipsec.com.hk,Phillip
  - DOMAIN-SUFFIX,phillip.com.sg,Phillip
  - DOMAIN-SUFFIX,zr.hk,Zircon
  - DOMAIN-SUFFIX,zr66.hk,Zircon
  - DOMAIN-SUFFIX,zrsecbk.com,Zircon

  # 第六层：AI 服务
  - RULE-SET,bm_gemini,AI
  - RULE-SET,bm_openai,AI

  # 第七层：泛加密货币综合
  - RULE-SET,bm_crypto,Crypto

  # 第八层：社交媒体与流媒体
  - RULE-SET,bm_tiktok,TikTok
  - RULE-SET,bm_netflix,NETFLIX
  - RULE-SET,bm_telegram,Telegram
  - RULE-SET,bm_instagram,Instagram
  - RULE-SET,bm_youtube,YouTube
  - RULE-SET,bm_google,Google
  - RULE-SET,bm_x,X

  # 第九层：开发者工具与游戏平台
  - RULE-SET,bm_github,GitHub
  - RULE-SET,bm_docker,Default
  - RULE-SET,bm_steam,Steam
  - RULE-SET,bm_xbox,Xbox
  - RULE-SET,bm_microsoft,Microsoft
  - RULE-SET,bm_nintendo,DIRECT
  - RULE-SET,bm_game,DIRECT

  # 巴哈姆特（台湾站）
  - DOMAIN-SUFFIX,gamer.com.tw,Taiwan

  # Apple 服务 → 国内直连
  - RULE-SET,ls_apple,DIRECT

  # 国内域名 → 直连
  - RULE-SET,ls_direct,DIRECT

  # GFW / 代理列表 → 兜底策略
  - RULE-SET,ls_gfw,Default
  - RULE-SET,ls_proxy,Default

  # 中国 IP → 直连（no-resolve）
  - RULE-SET,ls_cncidr,DIRECT,no-resolve

  # 终局
  - MATCH,Catch-All
